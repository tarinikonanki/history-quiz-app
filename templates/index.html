<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>American History Quiz</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      background: linear-gradient(160deg, #0d2b6e 0%, #1a4fa8 50%, #3a80d2 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      width: 100%;
      padding: 20px 40px;
      background: rgba(0, 0, 0, 0.2);
      text-align: center;
      border-bottom: 1px solid rgba(255, 255, 255, 0.15);
    }

    header h1 {
      color: #ffffff;
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      text-align: center;
      max-width: 520px;
      width: 100%;
    }

    main p {
      color: #c5d8f8;
      font-size: 1.1rem;
      line-height: 1.75;
      margin-bottom: 36px;
    }

    a.btn {
      display: inline-block;
      background: #ffffff;
      color: #1a4fa8;
      font-weight: 700;
      font-size: 1.05rem;
      padding: 14px 44px;
      border-radius: 50px;
      text-decoration: none;
      letter-spacing: 0.03em;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.25);
    }

    a.btn:hover {
      background: #ddeeff;
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
    }
  </style>
</head>
<body>
  <header>
    <h1>American History Quiz</h1>
  </header>

  <main>
    <p>
      Challenge yourself with 10 multiple-choice questions covering key events,
      figures, and turning points in American history. Each question gives you
      immediate feedback so you can learn as you go.
    </p>
    <a class="btn" href="{{ url_for('start') }}">Start Quiz</a>
  </main>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Question {{ current }} of {{ total }}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      background: linear-gradient(160deg, #0d2b6e 0%, #1a4fa8 50%, #3a80d2 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      width: 100%;
      padding: 20px 40px;
      background: rgba(0, 0, 0, 0.2);
      text-align: center;
      border-bottom: 1px solid rgba(255, 255, 255, 0.15);
    }

    header h1 {
      color: #ffffff;
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      width: 100%;
      max-width: 720px;
    }

    .progress {
      color: #c5d8f8;
      font-size: 0.95rem;
      margin-bottom: 16px;
      align-self: flex-start;
    }

    .card {
      background: rgba(255, 255, 255, 0.95);
      border-radius: 16px;
      padding: 36px 40px 32px;
      width: 100%;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.25);
    }

    .card h2 {
      font-size: 1.2rem;
      color: #0d2b6e;
      margin-bottom: 28px;
      line-height: 1.5;
    }

    .choices-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-bottom: 28px;
    }

    .choices-grid input[type="radio"] {
      position: absolute;
      opacity: 0;
      width: 0;
      height: 0;
    }

    .choices-grid label {
      display: flex;
      align-items: center;
      padding: 14px 16px;
      border: 2px solid #c5d8f8;
      border-radius: 10px;
      cursor: pointer;
      font-size: 0.95rem;
      color: #1a3a6e;
      background: #f4f8ff;
      transition: border-color 0.15s, background 0.15s;
      line-height: 1.4;
    }

    .choices-grid label:hover {
      border-color: #1a4fa8;
      background: #e4eeff;
    }

    .choices-grid input[type="radio"]:checked + label {
      border-color: #1a4fa8;
      background: #1a4fa8;
      color: #ffffff;
      font-weight: 600;
    }

    .submit-row {
      text-align: center;
    }

    button {
      background: #1a4fa8;
      color: #ffffff;
      border: none;
      padding: 13px 44px;
      border-radius: 50px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.15);
    }

    button:hover {
      background: #0d2b6e;
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.2);
    }
  </style>
</head>
<body>
  <header>
    <h1>American History Quiz</h1>
  </header>

  <main>
    <p class="progress">Question {{ current }} of {{ total }}</p>
    <div class="card">
      <h2>{{ question.question }}</h2>
      <form method="POST">
        <div class="choices-grid">
          {% for choice in question.choices %}
          <div>
            <input type="radio" name="choice" value="{{ choice }}" id="choice{{ loop.index }}" required>
            <label for="choice{{ loop.index }}">{{ choice }}</label>
          </div>
          {% endfor %}
        </div>
        <div class="submit-row">
          <button type="submit">Submit Answer</button>
        </div>
      </form>
    </div>
  </main>
</body>
</html>

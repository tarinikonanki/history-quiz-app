<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Quiz Results</title>
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 60px auto; text-align: center; }
    h1 { font-size: 2rem; margin-bottom: 0.5rem; }
    .score { font-size: 3rem; font-weight: bold; color: #2a6de6; margin: 1rem 0; }
    .message { color: #555; margin-bottom: 2rem; font-size: 1.1rem; }
    a.btn { background: #2a6de6; color: white; padding: 10px 24px; border-radius: 6px;
            text-decoration: none; font-size: 1rem; }
    a.btn:hover { background: #1a55c0; }
  </style>
</head>
<body>
  <h1>Quiz Complete!</h1>
  <p class="score">{{ score }} / {{ total }}</p>
  {% if score == total %}
    <p class="message">Perfect score — excellent work!</p>
  {% elif score >= total * 0.7 %}
    <p class="message">Good job! Keep studying to get them all.</p>
  {% else %}
    <p class="message">Keep at it — review the material and try again.</p>
  {% endif %}
  <a class="btn" href="{{ url_for('start') }}">Try Again</a>
</body>
</html>
